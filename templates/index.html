<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBOX</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            display: flex;
        }

        /* Phần Hỏi-đáp */
        #chat-container {
            flex-grow: 1; /* Chiếm phần lớn không gian */
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box; /* Tính padding vào kích thước */
        }

        /* Camera */
        #camera-container {
            width: 380px; /* Độ rộng cố định */
            flex-shrink: 0; /* Không bị co lại */
            padding: 20px;
            position: sticky;
            top: 0;
            height: 100vh;
            box-sizing: border-box;
        }

        /* Chi tiết các thành phần */
        #camera-box {
            width: 100%;
            background-color: #000;
            border: 2px solid #444;
            border-radius: 8px;
            /* Tính toán tỷ lệ 4:3 (ví dụ 360 / 4 * 3 = 270) */
            height: 285px; /* (380 - 40 padding) * 0.75 */
            overflow: hidden;
        }

        #camera-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Đảm bảo video lấp đầy */
        }

        #chat-box {
            flex-grow: 1; /* Lấp đầy không gian còn lại trong #chat-container */
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 20px;
            overflow-y: auto; /* Tự động cuộn khi đầy */
            border: 1px solid #333;
        }

        /* Style cho mỗi tin nhắn */
        .transcript-entry {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #444;
            background-color: #2d2d2d;
        }

        .transcript-entry strong {
            color: #4dabf7; /* Màu tên người nói */
            font-size: 1.1em;
        }

        .transcript-entry p {
            margin: 5px 0 0;
            font-size: 1.2em;
            line-height: 1.5;
        }

        #status-bar {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            transition: all 0.3s ease;
        }

        /* Trạng thái: Đang lắng nghe (Màu xanh dương nhạt/Xám) */
        .status-listening {
            background-color: #1e1e1e;
            border: 1px solid #444;
            color: #bbb;
        }
        
        /* Hiệu ứng chấm nhấp nháy khi đang nghe */
        .status-listening::after {
            content: " 🔴";
            animation: blink 1s infinite;
        }

        /* Trạng thái: Đang suy nghĩ (Màu vàng/Cam) */
        .status-thinking {
            background-color: #5c4b08; /* Nền vàng tối */
            border: 1px solid #e67700;
            color: #ffec99;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .ai-message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #2b8a3e; /* Viền xanh lá */
            background-color: #183623; /* Nền xanh tối */
            text-align: right;
        }
        .ai-message strong {
            color: #69db7c; /* Tên AI màu xanh sáng */
            font-size: 1.1em;
        }
        .ai-message p {
            margin: 5px 0 0;
            font-size: 1.2em;
            line-height: 1.5;
            color: #fff;
        }

        #stop-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            font-size: 1em;
            font-weight: bold;
            color: #fff;
            background-color: #c92a2a; /* Màu đỏ */
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #stop-btn:hover {
            background-color: #a61e1e; /* Màu đỏ đậm hơn */
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <h1>Hội thoại</h1>

        <div id="status-bar" class="status-listening">
            Đang thu âm... (Mời bạn nói)
        </div>
        <div id="chat-box">
            <p style="color: #888;"><i>Lịch sử trò chuyện...</i></p>
        </div>
    </div>

    <div id="camera-container">
        <h2>Camera</h2>
        <div id="camera-box">
            <img src="{{ url_for('video_feed') }}" width="100%">
        </div>

        <button id="stop-btn">Dừng chương trình</button>
    </div>

    <script>
        // Kết nối với máy chủ Socket.IO
        const socket = io();

        socket.on('connect', () => {
            console.log('Đã kết nối với máy chủ!');
        });

        // Lắng nghe sự kiện nhấp chuột vào nút Tắt
        document.getElementById('stop-btn').addEventListener('click', () => {
            if (confirm('Bạn có chắc chắn muốn dừng chương trình không?')) {
                console.log('Đang gửi tín hiệu dừng');
                socket.emit('stop_server'); // Gửi tín hiệu 'stop_server'
            }
        });

        // Lắng nghe sự kiện 'new_transcript' mà Python gửi
        socket.on('new_transcript', (data) => {
            console.log('Nhận được dữ liệu:', data);
            
            const chatBox = document.getElementById('chat-box');
            
            // Xóa tin nhắn "Đang chờ" nếu là tin đầu tiên
            if (chatBox.querySelector('i')) {
                chatBox.innerHTML = '';
            }

            // Tạo một khối HTML mới cho tin nhắn
            const entry = document.createElement('div');
            entry.className = 'transcript-entry';
            
            // Đặt tên là "Unknown" nếu là "Người lạ"
            let displayName = (data.name === 'Người lạ') ? 'Unknown' : data.name;

            entry.innerHTML = `
                <strong>${displayName} (Độ tin cậy: ${data.confidence.toFixed(2)})</strong>
                <p>${data.text || '...'}</p> 
            `; // Hiển thị '...' nếu text rỗng

            // Thêm tin nhắn vào cuối
            chatBox.appendChild(entry);

            // Tự động cuộn xuống dưới cùng
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        socket.on('update_status', (data) => {
            const statusEl = document.getElementById('status-bar');
            
            if (data.state === 'thinking') {
                statusEl.innerHTML = 'AI đang trả lời... (Vui lòng đợi)';
                statusEl.className = 'status-thinking';
            } else if (data.state === 'listening') {
                statusEl.innerHTML = 'Đang thu âm... (Mời bạn nói)';
                statusEl.className = 'status-listening';
            }
        });

        // Lắng nghe sự kiện 'ai_response' từ máy chủ
        socket.on('ai_response', (data) => {
            console.log('AI trả lời:', data);
            
            const chatBox = document.getElementById('chat-box');
            
            // Tạo khối tin nhắn AI
            const entry = document.createElement('div');
            entry.className = 'ai-message'; // Dùng class mới tạo
            
            entry.innerHTML = `
                <strong>Trợ lý AI</strong>
                <p>${data.text}</p> 
            `;

            chatBox.appendChild(entry);
            chatBox.scrollTop = chatBox.scrollHeight; // Tự cuộn xuống
        });

        socket.on('disconnect', () => {
            console.log('Đã mất kết nối với máy chủ');
        });
    </script>

</body>
</html>
